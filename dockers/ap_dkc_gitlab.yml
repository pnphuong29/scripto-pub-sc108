version: "3.9"
services:
    gitlab-web:
        container_name: ${AP_DK_CON_GITLAB}
        image: "gitlab/gitlab-ce:latest"
        restart: always
        hostname: ${AP_DOMAIN_GITLAB}
        environment:
            GITLAB_OMNIBUS_CONFIG: |
                external_url 'http://${AP_DOMAIN_GITLAB}:${AP_PORT_GITLAB_PUBLIC}'
                # external_url 'https://${AP_DOMAIN_GITLAB}:${AP_PORT_GITLAB_HTTPS}'
                gitlab_rails['gitlab_shell_ssh_port'] = ${AP_PORT_GITLAB_SSH}
                # https://docs.gitlab.com/omnibus/settings/ssl/#configure-the-http-strict-transport-security-hsts
                # puma['port'] = ${AP_PORT_GITLAB_HTTPS}
                letsencrypt['enable'] = false
                #nginx['enable'] = false
                #nginx['http2_enabled'] = false
                nginx['redirect_http_to_https'] = true
                nginx['hsts_max_age'] = 0 # to prevent errors about HSTS
                nginx['listen_port'] = ${AP_PORT_GITLAB_PUBLIC}
                nginx['listen_https'] = false
        ports:
            - "${AP_PORT_GITLAB_HTTPS}:${AP_PORT_GITLAB_HTTPS}"
            - "${AP_PORT_GITLAB_SSH}:22"
        volumes:
            - "${AP_SERVER_GITLAB_DIR}/configs:/etc/gitlab"
            - "${AP_SERVER_GITLAB_DIR}/logs:/var/log/gitlab"
            - "${AP_SERVER_GITLAB_DIR}/data:/var/opt/gitlab"
            # - "${AP_PRJ_SSL7_DIR}/letsencrypt/live/${AP_DOMAIN_GITLAB}/fullchain.pem:/etc/gitlab/ssl/${AP_DOMAIN_GITLAB}.crt"
            # - "${AP_PRJ_SSL7_DIR}/letsencrypt/live/${AP_DOMAIN_GITLAB}/privkey.pem:/etc/gitlab/ssl/${AP_DOMAIN_GITLAB}.key"
        shm_size: "256m"
