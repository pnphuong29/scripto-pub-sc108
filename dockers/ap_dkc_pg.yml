# https://hub.docker.com/_/postgres
version: "3.9"

services:
    pg:
        container_name: pg
        image: postgres:14.2
        # build:
        # context: ./pg
        # args:
        # VERSION: 14.2
        # dockerfile: ./dockerfiles/pg.Dockerfile
        restart: always
        tty: true
        environment:
            POSTGRES_PASSWORD_FILE: /run/secrets/pg_pass
            POSTGRES_USER: postgres
            POSTGRES_DB: postgres
            PGDATA: /var/lib/postgresql/data
            POSTGRES_HOST_AUTH_METHOD: password
            POSTGRES_INITDB_ARGS: --auth-host=password
        ports:
            - ${AP_PORT_PG_PUBLIC}:5432
        volumes:
            - ${AP_DATA1_DIR}/pg/db:/pg/data
            - ${AP_DATA1_DIR}/pg/backups/db:/backups
            # - ./entrypoints/ap_entrypoint_pg.sh:/ap_entrypoint.sh:ro
        # entrypoint: /ap_entrypoint.sh
        networks:
            - scripto
        secrets:
            - pg_pass

secrets:
    pg_pass:
        file: ${HOME}/secrets/ap_pg.passwd

networks:
    scripto:
        name: scripto
