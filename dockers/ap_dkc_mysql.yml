# https://hub.docker.com/_/mysql
version: "3.9"

services:
    mysql:
        container_name: mysql
        image: mysql:8.0
        # build:
        #     context: ./mysql
        #     args:
        #         VERSION: 8.0
        #     dockerfile: ./dockerfiles/mysql.Dockerfile
        environment:
            MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_pass
            # MYSQL_USER:  # Create a new user
            # MYSQL_PASSWORD: /run/secrets/mysql_pass # Password for the newly created user
            # MYSQL_DATABASE:
        restart: always
        tty: true
        ports:
            - ${AP_PORT_MYSQL_PUBLIC}:3306
        volumes:
            - ${AP_DATA1_DIR}/mysql/db:/var/lib/mysql
            - ${AP_DATA1_DIR}/mysql/backups/db:/backups
            # - ./entrypoints/ap_entrypoint_mysql.sh:/ap_entrypoint.sh:ro
        # entrypoint: /ap_entrypoint.sh
        # NOTE: use of "mysql_native_password" is not recommended: https://dev.mysql.com/doc/refman/8.0/en/upgrading-from-previous-series.html#upgrade-caching-sha2-password
        # command: --default-authentication-plugin=mysql_native_password
        command: --default-authentication-plugin=caching_sha2_password
        networks:
            - scripto
        secrets:
            - mysql_root_pass

secrets:
    mysql_root_pass:
        file: ${HOME}/secrets/ap_mysql_root.passwd

networks:
    scripto:
        name: scripto
