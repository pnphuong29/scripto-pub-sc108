# https://sw.kovidgoyal.net/kitty/open_actions/#scripting-the-opening-of-files-with-kitty-on-macos

# prettierrc
protocol file
url prettierrc
action launch --type=os-window nvim $FILE_PATH

# py files
protocol file
ext py
action launch --type=os-window nvim $FILE_PATH

# sql files
protocol file
ext sql
action launch --type=os-window nvim $FILE_PATH

# JSONL files
protocol file
ext jsonl
action launch --type=os-window nvim $FILE_PATH

# Dockerfile
protocol file
url Dockerfile
action launch --type=os-window nvim $FILE_PATH

# YAML file
protocol file
ext yml
action launch --type=os-window nvim $FILE_PATH
