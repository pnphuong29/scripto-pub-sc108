# ------- Fonts -------
font_family      Fira Code Retina
bold_font        Fira Code Bold
# italic_font      auto
# bold_italic_font auto
font_size 12.3

#: Choose how you want to handle multi-character ligatures. The
#: default is to always render them. You can tell kitty to not render
#: them when the cursor is over them by using cursor to make editing
#: easier, or have kitty never render them at all by using always, if
#: you don't like them. The ligature strategy can be set per-window
#: either using the kitty remote control facility or by defining
#: shortcuts for it in kitty.conf, for example::

#:     map alt+1 disable_ligatures_in active always
#:     map alt+2 disable_ligatures_in all never
#:     map alt+3 disable_ligatures_in tab cursor

#: Note that this refers to programming ligatures, typically
#: implemented using the calt OpenType feature. For disabling general
#: ligatures, use the font_features option.
# disable_ligatures never
disable_ligatures always

# ------- Cursor customization -------

# ------- Scrollback -------

# ------- Mouse -------

copy_on_select on

# ------- Mouse actions -------

#: Remove all mouse action definitions up to this point. Useful, for
#: instance, to remove the default mouse actions.
# clear_all_mouse_actions no

# ------- Performance tuning -------

# ------- Terminal bell -------

enable_audio_bell no

#: The visual bell duration (in seconds). Flash the screen when a bell
#: occurs for the specified number of seconds. Set to zero to disable.
# visual_bell_duration 0.0

# ------- Window layout -------

#: The enabled window layouts. A comma separated list of layout names.
#: The special value all means all layouts. The first listed layout
#: will be used as the startup layout. Default configuration is all
#: layouts in alphabetical order. For a list of available layouts, see
#: the layouts <https://sw.kovidgoyal.net/kitty/overview/#layouts>.
enabled_layouts grid, horizontal, vertical, tall:bias=50;full_size=1;mirrored=false, fat:bias=50;full_size=1;mirrored=false

# ------- Tab bar -------

tab_bar_edge top

#: The tab bar style, can be one of:

#: fade
#:     Each tab's edges fade into the background color. (See also tab_fade)
#: slant
#:     Tabs look like the tabs in a physical file.
#: separator
#:     Tabs are separated by a configurable separator. (See also
#:     tab_separator)
#: powerline
#:     Tabs are shown as a continuous line with "fancy" separators.
#:     (See also tab_powerline_style)
#: custom
#:     A user-supplied Python function called draw_tab is loaded from the file
#:     tab_bar.py in the kitty config directory. For examples of how to
#:     write such a function, see the functions named draw_tab_with_* in
#:     kitty's source code: kitty/tab_bar.py. See also
#:     this discussion <https://github.com/kovidgoyal/kitty/discussions/4447>
#:     for examples from kitty users.
#: hidden
#:     The tab bar is hidden. If you use this, you might want to create a mapping
#:     for the select_tab action which presents you with a list of tabs and
#:     allows for easy switching to a tab.
tab_bar_style powerline
# tab_bar_style separator

#: The powerline separator style between tabs in the tab bar when
#: using powerline as the tab_bar_style, can be one of: angled,
#: slanted, round.
tab_powerline_style angled

#: Some text or a Unicode symbol to show on the tab if a window in the
#: tab that does not have focus has some activity. If you want to use
#: leading or trailing spaces, surround the text with quotes. See
#: tab_title_template for how this is rendered.
tab_activity_symbol "🍎"

tab_bar_min_tabs 1

# ------- Color scheme -------

background_opacity 1.0

# ------- The color table -------

# ------- Advanced -------

#: Allow other programs to control kitty. If you turn this on, other
#: programs can control all aspects of kitty, including sending text
#: to kitty windows, opening new windows, closing windows, reading the
#: content of windows, etc. Note that this even works over SSH
#: connections.
allow_remote_control yes

#: The terminal based text editor (such as vim or nano) to use when
#: editing the kitty config file or similar tasks.
# `.` means use environment variable VISUAL then EDITOR
# editor .
editor ~/pnphuong29/software/nvim/bin/nvim

#: The maximum size (in MB) of data from programs running in kitty
#: that will be stored for writing to the system clipboard. A value of
#: zero means no size limit is applied. See also clipboard_control.
# clipboard_max_size 64
clipboard_max_size 0

#: Enable shell integration on supported shells. This enables features
#: such as jumping to previous prompts, browsing the output of the
#: previous command in a pager, etc. on supported shells. Set to
#: disabled to turn off shell integration, completely. It is also
#: possible to disable individual features, set to a space separated
#: list of these values: no-rc, no-cursor, no-title, no-cwd, no-
#: prompt-mark, no-complete. See Shell integration
#: <https://sw.kovidgoyal.net/kitty/shell-integration/> for details.
shell_integration enabled

# ------- OS specific tweaks -------

#: Use the Option key as an Alt key on macOS. With this set to no,
#: kitty will use the macOS native Option+Key to enter Unicode
#: character behavior. This will break any Alt+Key keyboard shortcuts
#: in your terminal programs, but you can use the macOS Unicode input
#: technique. You can use the values: left, right or both to use only
#: the left, right or both Option keys as Alt, instead. Note that
#: kitty itself always treats Option the same as Alt. This means you
#: cannot use this option to configure different kitty shortcuts for
#: Option+Key vs. Alt+Key. Also, any kitty shortcuts using
#: Option/Alt+Key will take priority, so that any such key presses
#: will not be passed to terminal programs running inside kitty.
#: Changing this option by reloading the config is not supported.
# macos_option_as_alt yes

#: Control where kitty finds the programs to run. The default search
#: order is: First search the system wide PATH, then ~/.local/bin and
#: ~/bin. If still not found, the PATH defined in the login shell
#: after sourcing all its startup files is tried. Finally, if present,
#: the PATH specified by the env option is tried.

#: This option allows you to prepend, append, or remove paths from
#: this search order. It can be specified multiple times for multiple
#: paths. A simple path will be prepended to the search order. A path
#: that starts with the + sign will be append to the search order,
#: after ~/bin above. A path that starts with the - sign will be
#: removed from the entire search order. For example::

#:     exe_search_path /some/prepended/path
#:     exe_search_path +/some/appended/path
#:     exe_search_path -/some/excluded/path
exe_search_path +~/pnphuong29/software/bin
exe_search_path +/usr/local/bin
exe_search_path +/usr/local/sbin

#: Specify the environment variables to be set in all child processes.
#: Using the name with an equal sign (e.g. env VAR=) will set it to
#: the empty string. Specifying only the name (e.g. env VAR) will
#: remove the variable from the child process' environment. Note that
#: environment variables are expanded recursively, for example::

#:     env VAR1=a
#:     env VAR2=${HOME}/${VAR1}/b
env AP_VENDORS_PYTHON_KITTY_SETUP_DIR=~/pnphuong29/projects/p29-github/pnphuong29/ap-scripts-common-sc28/vendors/python-kitty
env AP_VENDORS_PYTHON_KITTY_SETUP_CONFIGS_DIR=~/pnphuong29/projects/p29-github/pnphuong29/ap-scripts-common-sc28/vendors/python-kitty/configs

# ------- Actions -------

action_alias launch_tab launch --type=tab --cwd=current

# ------- Keyboard shortcuts -------

#: Remove all shortcut definitions up to this point. Useful, for
#: instance, to remove the default shortcuts.
clear_all_shortcuts yes

# kitty_mod ctrl+shift

# ------- Clipboard -------

map super+c copy_to_clipboard
map super+v paste_from_clipboard

# ------- Scrolling -------

# ------- Window management -------

map super+n new_os_window
map super+q close_os_window
# map super+shift+q close_os_window

# map super+shift+\ new_window_with_cwd
map super+d launch --location=vsplit
map super+shift+d launch --location=hsplit
map super+w close_window
map ctrl+shift+d detach_window ask

# map super+ctrl+up neighboring_window top
# map super+ctrl+down neighboring_window bottom
# map super+ctrl+left neighboring_window left
# map super+ctrl+right neighboring_window right

map super+up neighboring_window top
map super+down neighboring_window bottom
map super+left neighboring_window left
map super+right neighboring_window right

map super+shift+i move_window top
map super+shift+k move_window bottom
map super+shift+j move_window left
map super+shift+l move_window right

map super+shift+down resize_window taller 3
map super+shift+up resize_window shorter 3
map super+shift+left resize_window narrower 3
map super+shift+right resize_window wider 3
map super+shift+0 resize_window reset

# ------- Tab management -------

# map super+t new_tab_with_cwd
map super+t new_tab
# map super+w close_tab
# map super+ctrl+w close_tab
map super+ctrl+d detach_tab ask

map meta+1 goto_tab 1
map meta+2 goto_tab 2

map super+1 goto_tab 1
map super+2 goto_tab 2
map super+3 goto_tab 3
map super+4 goto_tab 4
map super+5 goto_tab 5
map super+6 goto_tab 6
map super+7 goto_tab 7
map super+8 goto_tab 8
map super+9 goto_tab 9

# map super+left previous_tab
map super+ctrl+left previous_tab
# map super+right next_tab
map super+ctrl+right next_tab

map ctrl+shift+left move_tab_backward
map ctrl+shift+right move_tab_forward

# ------- Layout management -------

map super+shift+o next_layout
map super+shift+r rotate

# ------- Font sizes -------

# ------- Miscellaneous -------

# Edit kitty configs
map super+, launch_tab nvim -p ~/pnphuong29/projects/p29-github/pnphuong29/ap-scripts-common-sc28/vendors/python-kitty/configs/ap_kitty.conf ~/.config/kitty/kitty.conf

#::  Reload kitty.conf, applying any changes since the last time it
#::  was loaded. Note that a handful of options cannot be dynamically
#::  changed and require a full restart of kitty. Particularly, when
#::  changing shortcuts for actions located on the macOS global menu
#::  bar, a full restart is needed. You can also map a keybinding to
#::  load a different config file, for example::

#::      map f5 load_config /path/to/alternative/kitty.conf

#::  Note that all options from the original kitty.conf are discarded,
#::  in other words the new configuration *replace* the old ones.
map ctrl+super+, load_config_file

map ctrl+super+d debug_config

# Open kitty website
map super+ctrl+/ open_url https://sw.kovidgoyal.net/kitty/overview/

# Mouse
mouse_map right press ungrabbed mouse_select_command_output

# map f1 show_last_visited_command_output
# map f2 show_first_command_output_on_screen
