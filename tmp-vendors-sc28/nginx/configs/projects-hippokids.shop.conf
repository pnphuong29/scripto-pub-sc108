server {
	listen ${{AP_NGINX_PORT}};
	server_name ${{AP_NGINX_HOST}}-hippokids.shop;

	root ${{AP_PERSONAL_PROJECTS_DIR}}/hippokids.shop/src/wordpress;
	index index.php;

	error_log  ${{AP_LOGS_DIR}}/nginx/projects/hippokids.shop/error.log;
	access_log ${{AP_LOGS_DIR}}/nginx/projects/hippokids.shop/access.log;

	location ~ \.php$ {
		fastcgi_pass 	127.0.0.1:${{AP_VENDORS_PHP73_FPM_PORT}};
		fastcgi_index index.php;
		include 			fastcgi_params;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
	}
}
