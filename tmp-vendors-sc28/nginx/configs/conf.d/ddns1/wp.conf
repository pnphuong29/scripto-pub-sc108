server {
    listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name wp.ohmmanipadmehum.ddns.info;
    ssl_certificate /etc/letsencrypt/live/wp.ohmmanipadmehum.ddns.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wp.ohmmanipadmehum.ddns.info/privkey.pem;

	# ssl_session_cache builtin:1000 shared:SSL:10m;
    # ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    # ssl_ciphers HIGH:!aNULL:!eNULL:!EXPORT:!CAMELLIA:!DES:!MD5:!PSK:!RC4;
    # ssl_prefer_server_ciphers on;

	# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";

	error_log  /var/log/nginx/wp-error.log;
	access_log /var/log/nginx/wp-access.log;

	location / {
		proxy_pass http://127.0.0.1:10173;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $host;
		# proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        # proxy_cache_bypass $http_upgrade;
        client_max_body_size 0;
    }

	include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = wp.ohmmanipadmehum.ddns.info) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
	server_name wp.ohmmanipadmehum.ddns.info;
    return 404; # managed by Certbot
}
