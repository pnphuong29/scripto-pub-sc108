server {
    listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name hedgedoc.ohmmanipadmehum.ddns.info;
    ssl_certificate /etc/letsencrypt/live/hedgedoc.ohmmanipadmehum.ddns.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hedgedoc.ohmmanipadmehum.ddns.info/privkey.pem;

	error_log  /var/log/nginx/hedgedoc-server-error.log;
	access_log /var/log/nginx/hedgedoc-server-access.log;

	location / {
		# https://docs.hedgedoc.org/guides/reverse-proxy/
		proxy_pass http://127.0.0.1:11222;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $host;
		# proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        # proxy_cache_bypass $http_upgrade;
        client_max_body_size 0;
    }

	include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = hedgedoc.ohmmanipadmehum.ddns.info) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
	server_name hedgedoc.ohmmanipadmehum.ddns.info;
    return 404; # managed by Certbot
}
