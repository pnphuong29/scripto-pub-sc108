server {
    listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name gitlab.ohmmanipadmehum.ddns.info;
    ssl_certificate /etc/letsencrypt/live/gitlab.ohmmanipadmehum.ddns.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gitlab.ohmmanipadmehum.ddns.info/privkey.pem;

	error_log  /var/log/nginx/gitlab-error.log;
	access_log /var/log/nginx/gitlab-access.log;

	location / {
		proxy_pass http://127.0.0.1:15231;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $host;
		# proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        # proxy_cache_bypass $http_upgrade;
        client_max_body_size 0;
    }
}
