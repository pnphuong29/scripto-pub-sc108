server {
	listen ${{AP_NGINX_PORT}};
	server_name ${{AP_NGINX_HOST}}-intranet;

	root ${{AP_PERSONAL_PROJECTS_DIR}}/intranet/src/laravel/public;
	index index.php index.html;

	error_log  ${{AP_LOGS_DIR}}/nginx/projects/intranet/error.log;
	access_log ${{AP_LOGS_DIR}}/nginx/projects/intranet/access.log;

	location / {
		try_files $uri $uri/ /index.php?$query_string;
		gzip_static on;
	}

	location ~ \.php$ {
		fastcgi_split_path_info ^(.+?\.php)(/.*)$;
		if (!-f $document_root$fastcgi_script_name) {
			return 404;
		}

		fastcgi_pass 	127.0.0.1:${{AP_VENDORS_PHP73_FPM_PORT}};
		fastcgi_index index.php;

		include 			fastcgi_params;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_param PATH_INFO $fastcgi_path_info;
	}
}
