RewriteEngine on
RewriteCond %{SERVER_NAME} =${{AP_PHPMYADMIN_HOST}}
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<VirtualHost *:${{AP_APACHE_HTTPS_PORT}}>
	DocumentRoot "${{AP_PHPMYADMIN_DIR}}"
	ServerName ${{AP_PHPMYADMIN_HOST}}

	<Directory "${{AP_PHPMYADMIN_DIR}}">
		AuthType Basic
		AuthName "Restricted Files"
		AuthBasicProvider file
		AuthUserFile "${{AP_APACHE_HTTP_AUTH_USER_FILE}}"
		Require user "${{AP_APACHE_HTTP_AUTH_REQUIRE_USERS}}"

		Options Indexes FollowSymLinks
		AllowOverride All
	</Directory>

	SSLEngine on

  <FilesMatch "\.(cgi|shtml|phtml|php)$">
    SSLOptions +StdEnvVars
  </FilesMatch>

  <Directory "/var/www/cgi-bin">
      SSLOptions +StdEnvVars
  </Directory>

  BrowserMatch "MSIE [2-5]" \
          nokeepalive ssl-unclean-shutdown \
          downgrade-1.0 force-response-1.0

  SSLCertificateFile ${{AP_CONFIGS_OS_APACHE_HTTP_CERTS_DIR}}/${{AP_PHPMYADMIN_HOST}}-cert.pem
  SSLCertificateKeyFile ${{AP_CONFIGS_OS_APACHE_HTTP_CERTS_DIR}}/${{AP_PHPMYADMIN_HOST}}-key.pem

  ErrorLog "|${{AP_VENDORS_APACHE_HTTP_ROTATELOGS_FILE}} ${{AP_LOGS_PHPMYADMIN_ERROR_FILE}} 86400"
	CustomLog "|${{AP_VENDORS_APACHE_HTTP_ROTATELOGS_FILE}} ${{AP_LOGS_PHPMYADMIN_CUSTOM_FILE}} 86400" combined
</VirtualHost>
