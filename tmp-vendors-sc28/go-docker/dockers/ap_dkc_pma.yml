# https://hub.docker.com/r/phpmyadmin/phpmyadmin/
# https://docs.phpmyadmin.net/en/latest/setup.html#installing-using-docker
version: ${AP_DKCF_VER}

services:
    pma:
        container_name: ${AP_DK_CON_PMA}
        depends_on:
            - ${AP_DK_CON_MYSQL}
        image: phpmyadmin
        healthcheck:
            test: curl --fail -I ${AP_URL_PMA} || exit 1
            interval: 15s
            timeout: 5s
            retries: 5
        restart: always
        tty: true
        ports:
            - ${AP_PORT_PMA_PUBLIC}:80
        # environment:
        # - PMA_ABSOLUTE_URI=${AP_DOMAIN_PMA}
        # - PMA_ARBITRARY=1 # Use with arbitrary MySQL server
        # - PMA_HOST=${AP_DK_CON_MYSQL}
        # - PMA_HOSTS=${AP_DK_CON_MYSQL} # Define comma separated list of address/host names of the MySQL servers
        # - PMA_PORTS= # Comma-separated ports of the database server to use.
        volumes:
            - ./configs/pma/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php # Custom user config
        # - ${AP_SERVER_PMA_DATA_DIR}/sessions:/sessions # Directory where PHP sessions are stored. You might want to share this for example when using Signon authentication mode.
        #     - ./entrypoints/ap_entrypoint_${AP_DK_CON_PMA}.sh:/ap_entrypoint.sh:ro
        # entrypoint: /ap_entrypoint.sh
