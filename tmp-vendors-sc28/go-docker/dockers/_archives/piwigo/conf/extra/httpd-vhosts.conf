Listen 10022

# Default server info
ServerName localhost
ServerAdmin nidnos@gmail.com

<VirtualHost *:10022>
	DocumentRoot /piwigo/www

	<Directory /piwigo/www>
		Options Indexes FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog "|/usr/bin/rotatelogs /piwigo/logs/error.%Y-%m-%d-%H_%M_%S.log 86400"
	CustomLog "|/usr/bin/rotatelogs /piwigo/logs/custom.%Y-%m-%d-%H_%M_%S.log 86400" combined
</VirtualHost>
