version: '3.9'

services:
    httpd_server:
        container_name: ${AP_DK_CON_NAME_HTTPD_SERVER}
        build:
            context: ./${AP_DK_CON_NAME_HTTPD_SERVER}
            args:
                VERSION: 2.4.53
            dockerfile: Dockerfile
        restart: always
        healthcheck:
            test: curl --fail -I http://localhost:${AP_PORT_HTTPD_SERVER_NGINX} || exit 1
            interval: 15s
            timeout: 5s
            retries: 5
        tty: true
        ports:
            - ${AP_PORT_HTTPD_SERVER}:${AP_PORT_HTTPD_SERVER_GUEST}
        volumes:
            - ./${AP_DK_CON_NAME_HTTPD_SERVER}/ap_entrypoint.sh:/ap_entrypoint.sh:ro
            - ${AP_PRJ_DEV7_DIR}/www:/sc28/httpd-server/www
            - ${AP_HTTPD_SERVER_LOGS_DIR}:/sc28/httpd-server/logs
        entrypoint: /ap_entrypoint.sh
        networks:
            - sc28
