Listen @{AP_PORT_JOPLIN_WEBDAV}@

# Default server info
ServerName localhost
ServerAdmin nidnos@gmail.com

DavLockDB "/usr/local/apache2/var/DavLock"

<VirtualHost *:@{AP_PORT_JOPLIN_WEBDAV}@>
	# ServerName ohmmanipadmehum.ddns.net
	# DocumentRoot /var/www/ohmmanipadmehum.ddns.net
	Alias /webdav /var/www/webdav

	<Directory /var/www/webdav>
		DAV On
		AuthType Basic
        AuthName "Restricted Content"
        AuthBasicProvider file
		AuthUserFile /usr/local/apache2/conf/.htpasswd_basic

		# AuthType Digest
		# AuthName "webdav"
		# AuthDigestProvider file
		# AuthUserFile /usr/local/apache2/conf/.htpasswd_digest
		
		Require valid-user
	</Directory>

	ErrorLog "|/usr/local/apache2/bin/rotatelogs /sc28/joplin-webdav/logs/error.%Y-%m-%d-%H_%M_%S.log 86400"
	# CustomLog "|/usr/local/apache2/bin/rotatelogs /sc28/joplin-webdav/logs/custom.%Y-%m-%d-%H_%M_%S.log 86400" combined
</VirtualHost>
