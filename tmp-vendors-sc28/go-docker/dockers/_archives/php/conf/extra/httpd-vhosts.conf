Listen 10099

# Default server info
ServerName localhost
ServerAdmin nidnos@gmail.com

<VirtualHost *:10099>
	DocumentRoot /www

	<Directory /www>
		Options Indexes FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog "|/usr/bin/rotatelogs /logs/error.%Y-%m-%d-%H_%M_%S.log 86400"
	CustomLog "|/usr/bin/rotatelogs /logs/custom.%Y-%m-%d-%H_%M_%S.log 86400" combined
</VirtualHost>
