Listen 9977

# Default server info
ServerName localhost
ServerAdmin nidnos@gmail.com

# https://httpd.apache.org/docs/2.4/mod/mod_ssl.html#sslsessioncache
# https://cwiki.apache.org/confluence/display/HTTPD/SSLSessionCache
SSLSessionCache shmcb:/ssl_scache(512000)
DavLockDB "/usr/local/apache2/var/DavLock"

<IfModule mod_ssl.c>
<VirtualHost *:9977>
	DocumentRoot /www
	Alias /webdav /www

	<Directory /www>
		# Options Indexes FollowSymLinks
		# IndexOptions FancyIndexing
		# IndexOptions HTMLTable
		# IndexOptions VersionSort
		# IndexOptions FoldersFirst
		# IndexOptions NameWidth=*
		# IndexOptions SuppressDescription
		# IndexOptions SuppressLastModified
		# IndexOptions Charset=UTF-8
		# AllowOverride All
		# Require all granted
		
		DAV On
		# AuthType Basic
        # AuthName "Restricted Content"
        # AuthBasicProvider file
		# AuthUserFile /usr/local/apache2/conf/.htpasswd_basic

		AuthType Digest
		AuthName "webdav"
		AuthDigestProvider file
		AuthUserFile /usr/local/apache2/conf/.htpasswd_digest
		
		Require valid-user
	</Directory>

	Include /etc/letsencrypt/options-ssl-apache.conf
	SSLCertificateFile /etc/letsencrypt/live/ohmmanipadmehum.ddns.info/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/ohmmanipadmehum.ddns.info/privkey.pem

	ErrorLog "|/usr/local/apache2/bin/rotatelogs /logs/error.%Y-%m-%d-%H_%M_%S.log 86400"
	# CustomLog "|/usr/local/apache2/bin/rotatelogs /logs/custom.%Y-%m-%d-%H_%M_%S.log 86400" combined
</VirtualHost>
</IfModule>
