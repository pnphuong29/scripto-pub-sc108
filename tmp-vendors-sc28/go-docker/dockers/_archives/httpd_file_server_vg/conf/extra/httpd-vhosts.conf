Listen 9021

# Default server info
ServerName localhost
ServerAdmin nidnos@gmail.com

<VirtualHost *:9021>
	DocumentRoot /sc28/httpd-file-server/data

	<Directory /sc28/httpd-file-server/data>
		Options Indexes FollowSymLinks
		IndexOptions FancyIndexing
		IndexOptions HTMLTable
		IndexOptions VersionSort
		IndexOptions FoldersFirst
		IndexOptions NameWidth=*
		IndexOptions SuppressDescription
		IndexOptions SuppressLastModified
		IndexOptions Charset=UTF-8
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog "|/usr/local/apache2/bin/rotatelogs /sc28/httpd-file-server/logs/error.%Y-%m-%d-%H_%M_%S.log 86400"
	CustomLog "|/usr/local/apache2/bin/rotatelogs /sc28/httpd-file-server/logs/custom.%Y-%m-%d-%H_%M_%S.log 86400" combined
</VirtualHost>
