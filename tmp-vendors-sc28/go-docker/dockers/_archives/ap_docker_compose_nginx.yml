version: '3.9'

volumes:
    sc28-nginx:

services:
    nginx:
        container_name: sc28-nginx
        build:
            context: ./nginx
            dockerfile: Dockerfile
        restart: always
        tty: true
        ports:
            - '${AP_PORT_NGINX}:9090'
        volumes:
            - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./nginx/certs:/certs:ro
            - ./nginx/conf/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
            - ./nginx/ap_entrypoint.sh:/nginx/ap_entrypoint.sh:ro
            - sc28-nginx:/sc28/nginx
        entrypoint: /nginx/ap_entrypoint.sh
        networks:
            - sc28
