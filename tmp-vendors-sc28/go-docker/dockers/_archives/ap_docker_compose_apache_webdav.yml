version: '3.9'

services:
    apache_webdav:
        container_name: ${AP_DK_CON_NAME_APACHE_WEBDAV}
        build:
            context: ./${AP_DK_CON_NAME_APACHE_WEBDAV}
            args:
                VERSION: 2.4.53
            dockerfile: Dockerfile
        restart: always
        tty: true
        ports:
            - ${AP_PORT_APACHE_WEBDAV}:${AP_PORT_APACHE_WEBDAV_GUEST}
        volumes:
            - ${AP_SC_LETSENCRYPT_DIR}:/etc/letsencrypt
            - ${AP_APACHE_WEBDAV_DATA_DIR}:/www
            - ${AP_APACHE_WEBDAV_LOGS_DIR}:/logs
            - ./${AP_DK_CON_NAME_APACHE_WEBDAV/ap_entrypoint.sh:/ap_entrypoint.sh:ro
        entrypoint: /ap_entrypoint.sh
        # networks:
        #     - sc28
