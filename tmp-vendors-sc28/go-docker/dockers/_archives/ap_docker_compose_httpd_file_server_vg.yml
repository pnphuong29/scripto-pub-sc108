version: '3.9'

services:
  httpd:
    container_name: sc28-httpd-file-server
    build:
      context: ./httpd-file-server
      dockerfile: Dockerfile
    restart: always
    tty: true
    ports:
      - '9021:9021'
    volumes:
      - ./httpd-file-server/conf/original:/sc28/httpd-file-server/conf/original
      - ./httpd-file-server/ap_entrypoint.sh:/sc28/httpd-file-server/ap_entrypoint.sh:ro
      - ~/pnphuong29/shares/data/file-server:/sc28/httpd-file-server/data
    entrypoint: /sc28/httpd-file-server/ap_entrypoint.sh

networks:
  default:
    name: sc28
