# https://hub.docker.com/_/php
version: '3.9'

services:
    php_apache:
        container_name: ${AP_DK_CON_NAME_PHP_APACHE}
        build:
            context: ./${AP_DK_CON_NAME_PHP_APACHE}
            args:
                VERSION: 8.0
            dockerfile: Dockerfile
        healthcheck:
            test: curl --fail -I ${AP_URL_PHP_APACHE} || exit 1
            interval: 15s
            timeout: 5s
            retries: 5
        restart: always
        tty: true
        ports:
            - ${AP_PORT_PHP_APACHE}:${AP_PORT_PHP_APACHE_GUEST}
        volumes:
            - ${AP_PHP_APACHE_SERVER_DATA_DIR}:/www
            - ${AP_PHP_APACHE_SERVER_LOGS_DIR}:/logs
            - ./${AP_DK_CON_NAME_PHP_APACHE}/ap_entrypoint.sh:/ap_entrypoint.sh:ro
        entrypoint: /ap_entrypoint.sh
        # networks:
        # - sc28
