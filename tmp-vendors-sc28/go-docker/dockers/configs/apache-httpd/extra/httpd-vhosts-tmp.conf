Listen 9021

# Default server info
ServerName localhost
ServerAdmin nidnos@gmail.com

<VirtualHost *:9021>
	DocumentRoot /www

	<Directory /www>
		Options Indexes FollowSymLinks
		IndexOptions FancyIndexing
		IndexOptions HTMLTable
		IndexOptions VersionSort
		IndexOptions FoldersFirst
		IndexOptions NameWidth=*
		IndexOptions SuppressDescription
		IndexOptions SuppressLastModified
		IndexOptions Charset=UTF-8
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog "|/usr/local/apache2/bin/rotatelogs /logs/error.%Y-%m-%d-%H_%M_%S.log 86400"
	# CustomLog "|/usr/local/apache2/bin/rotatelogs /logs/custom.%Y-%m-%d-%H_%M_%S.log 86400" combined
</VirtualHost>
