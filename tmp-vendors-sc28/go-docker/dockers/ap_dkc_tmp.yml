version: ${AP_DKCF_VER}

services:
    tmp:
        container_name: ${AP_DK_CON_TMP}
        build:
            context: .
            args:
                VERSION: 2.4.53
                AP_DK_CON_TMP: ${AP_DK_CON_TMP}
            dockerfile: ./dockerfiles/${AP_DK_CON_TMP}.Dockerfile
        restart: always
        tty: true
        ports:
            - ${AP_PORT_TMP_PUBLIC}:9021
        volumes:
            - /mnt/lvm/data1/filebrowser/data/int1dev:/www
            - ./entrypoints/ap_entrypoint_${AP_DK_CON_TMP}.sh:/ap_entrypoint.sh:ro
        entrypoint: /ap_entrypoint.sh
