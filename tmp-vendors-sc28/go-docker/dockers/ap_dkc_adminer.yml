# https://hub.docker.com/_/adminer
version: ${AP_DKCF_VER}

services:
    adminer:
        container_name: ${AP_DK_CON_ADMINER}
        depends_on:
            - ${AP_DK_CON_MYSQL}
            - ${AP_DK_CON_PG}
        image: adminer:latest
        restart: always
        healthcheck:
            test: curl --fail -I ${AP_URL_ADMINER} || exit 1
            interval: 15s
            timeout: 5s
            retries: 5
        tty: true
        ports:
            - ${AP_PORT_ADMINER_PUBLIC}:8080
        # volumes:
        #     - ./entrypoints/ap_entrypoint_${AP_DK_CON_ADMINER}.sh:/ap_entrypoint.sh:ro
        #     - ./entrypoints/ap_entrypoint_debug.sh:/ap_entrypoint.sh:ro
        # entrypoint: /ap_entrypoint.sh
        networks:
            - sc28
