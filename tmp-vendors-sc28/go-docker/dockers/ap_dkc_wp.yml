        #     depends_on:
        #         - wp_db
        #     build:
        #         context: ./${AP_DK_CON_NAME_WP}
        #         args:
        #             VERSION: 8.0
        #         dockerfile: Dockerfile
        #     healthcheck:
        #         test: curl --fail -I ${AP_URL_WP} || exit 1
