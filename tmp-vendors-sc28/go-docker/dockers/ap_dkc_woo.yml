# https://hub.docker.com/_/wordpress
version: ${AP_DKCF_VER}

services:
    woomysql:
        container_name: ${AP_DK_CON_WOO_MYSQL}
        image: mysql:8.0
        # build:
        #     context: .
        #     args:
        #         VERSION: 8.0
        #     dockerfile: ./dockerfiles/${AP_DK_CON_WOO}.Dockerfile
        environment:
            MYSQL_ROOT_PASSWORD_FILE: /run/secrets/woo_db_root_pass
            MYSQL_DATABASE: ${AP_DK_WOO_MYSQL_NAME} # Create a new database
            MYSQL_USER: ${AP_DK_WOO_MYSQL_USER} # Create a new user with grant to newly created DB
            MYSQL_PASSWORD_FILE: /run/secrets/woo_db_pass # Password for the newly created user
        restart: always
        tty: true
        ports:
            - ${AP_PORT_WOO_MYSQL_PUBLIC}:3306
        volumes:
            - ${AP_SERVER_WOO_DB_DIR}/mysql:/var/lib/mysql
            - ${AP_SERVER_WOO_BK_DIR}/db:/backups
            # - ./entrypoints/ap_entrypoint_${AP_DK_CON_WOO}.sh:/ap_entrypoint.sh:ro
        # entrypoint: /ap_entrypoint.sh
        # NOTE: use of "mysql_native_password" is not recommended: https://dev.mysql.com/doc/refman/8.0/en/upgrading-from-previous-series.html#upgrade-caching-sha2-password
        # (this is just an example, not intended to be a production configuration)
        # command: --default-authentication-plugin=mysql_native_password
        command: --default-authentication-plugin=caching_sha2_password
        secrets:
            - woo_mysql_pass
            - woo_mysql_root_pass

    woo:
        container_name: ${AP_DK_CON_WOO}
        depends_on: ${AP_DK_CON_WOO_MYSQL}
        image: wordpress:latest
        healthcheck:
            test: curl --fail -I ${AP_URL_WOO} || exit 1
            interval: 15s
            timeout: 5s
            retries: 5
        restart: always
        tty: true
        ports:
            - ${AP_PORT_WOO_DK}:80
        environment:
            WORDPRESS_DB_HOST: ${AP_DK_CON_WOO_MYSQL}
            WORDPRESS_DB_USER: ${AP_DK_WOO_MYSQL_USER}
            WORDPRESS_DB_PASSWORD: ${AP_SECRET_WOO_MYSQL_PASS}
            # WORDPRESS_DB_PASSWORD_FILE: /run/secrets/woo_mysql_pass # Cannot use due to access denied to docker secret file, use Docker Swarm instead
            WORDPRESS_DB_NAME: ${AP_DK_WOO_MYSQL_NAME}
        volumes:
            - ${AP_SERVER_WOO_DATA_DIR}:/var/www/html
            # - ${AP_SERVER_WOO_LOGS_DIR}:/logs
            # - ./entrypoints/ap_entrypoint_${AP_DK_CON_WOO}.sh:/ap_entrypoint.sh:ro
        # entrypoint: /ap_entrypoint.sh
