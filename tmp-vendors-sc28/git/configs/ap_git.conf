[core]
editor = nvim
pager = delta
ignorecase = false
excludesFile = /Users/pnphuong29/scripto/projects/github.com/pnphuong29/ap-scripts-common-sc28/vendors/git/configs/ap_gitignore_global.ignore

[merge "ours"]
driver = true

[interactive]
diffFilter = delta --color-only

[delta]
navigate = true # use n and N to move between diff sections
side-by-side = true

[merge]
conflictstyle = diff3

[pull]
rebase = false

[diff]
colorMoved = default

[init]
defaultBranch = master
