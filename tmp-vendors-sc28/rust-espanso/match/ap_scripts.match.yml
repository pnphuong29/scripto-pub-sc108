matches:
  - trigger: "!!scf1"
    replace: "{{template_content}}"
    label: "SC28 - Template - Function 1"
    vars:
      - name: template_content
        type: shell
        params:
          cmd: "cat ~/scripto-common/templates/ap_func_1.tpl.sh"
