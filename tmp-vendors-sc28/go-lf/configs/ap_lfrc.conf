set shell bash
set hidden true
# set hidden off
set tabstop 4
set mouse on

# key map
map <c-n> $touch ap_tmp
map <f-2> rename
map <enter> open
map <esc> quit
map <backspace2> delete
map D delete
map i up
map k down
map j updir
map l open
map I half-up
map K half-down
map <pgup> half-up
map <pgdn> half-down
