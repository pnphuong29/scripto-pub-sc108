numbered_command = true

use_trash = true
watch_files = true
xdg_open = false
xdg_open_fork = false

[display]
# default, hsplit
mode = "default"
# mode = "hsplit"

automatically_count_files = false
collapse_preview = true
# ratios for parent view (optional), current view and preview
column_ratio = [1, 4, 4]
scroll_offset = 6
show_borders = true
show_hidden = true
show_icons = true
tilde_in_titlebar = true
# none, absolute, relative
line_number_style = "none"

[display.sort]
# lexical, mtime, natural
method = "natural"
case_sensitive = false
directories_first = true
reverse = false

[preview]
# use_preview_script = true
# max_preview_size = 2097152 # 2M
# preview_images = true
preview_shown_hook_script = "~/scripto-common/vendors/joshuto/configs/on_preview_shown_kitty.sh"
preview_removed_hook_script = "~/scripto-common/vendors/joshuto/configs/on_preview_removed_kitty.sh"
# preview_shown_hook_script = "~/scripto-common/vendors/joshuto/configs/on_preview_shown.sh"
# preview_removed_hook_script = "~/scripto-common/vendors/joshuto/configs/on_preview_removed.sh"
preview_script = "~/scripto-common/vendors/joshuto/configs/preview_file.sh"

[tab]
# inherit, home, root
home_page = "home"
