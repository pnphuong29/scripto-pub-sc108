# /etc/apache2/sites-available/ap_nextcloud.conf
Listen @{AP_PORT_NEXTCLOUD}@
Listen @{AP_PORT_NEXTCLOUD_HTTPS}@

<VirtualHost *:@{AP_PORT_NEXTCLOUD}@>
	DocumentRoot @{AP_NEXTCLOUD_SERVER_DOCUMENT_ROOT}@
	ServerName @{AP_DOMAIN_NEXTCLOUD}@

	<Directory @{AP_NEXTCLOUD_SERVER_DOCUMENT_ROOT}@>
    	Require all granted
    	AllowOverride All
    	Options Indexes FollowSymLinks MultiViews

    	<IfModule mod_dav.c>
    		Dav off
    	</IfModule>
	</Directory>

	ErrorLog "|@{AP_APACHE_HTTPD_ROTATELOGS_FILE_PATH}@ @{AP_NEXTCLOUD_SERVER_LOGS_DIR}@/error_%Y%m%d_%H%M%S.log 86400"
	CustomLog "|@{AP_APACHE_HTTPD_ROTATELOGS_FILE_PATH}@ @{AP_NEXTCLOUD_SERVER_LOGS_DIR}@/custom_%Y%m%d_%H%M%S.log 86400" combined

	RewriteEngine on
	RewriteCond %{SERVER_NAME} =@{AP_DOMAIN_NEXTCLOUD}@
	RewriteRule ^ https://%{SERVER_NAME}:@{AP_PORT_NEXTCLOUD_HTTPS}@%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:@{AP_PORT_NEXTCLOUD_HTTPS}@>
	DocumentRoot @{AP_NEXTCLOUD_SERVER_DOCUMENT_ROOT}@
	ServerName @{AP_DOMAIN_NEXTCLOUD}@

	<IfModule mod_headers.c>
      Header always set Strict-Transport-Security "max-age=15552000; includeSubDomains"
    </IfModule>

	<Directory @{AP_NEXTCLOUD_SERVER_DOCUMENT_ROOT}@>
    	Require all granted
    	AllowOverride All
    	Options Indexes FollowSymLinks MultiViews

    	<IfModule mod_dav.c>
    		Dav off
    	</IfModule>
	</Directory>

	ErrorLog "|@{AP_APACHE_HTTPD_ROTATELOGS_FILE_PATH}@ @{AP_NEXTCLOUD_SERVER_LOGS_DIR}@/error_%Y%m%d_%H%M%S.log 86400"
	CustomLog "|@{AP_APACHE_HTTPD_ROTATELOGS_FILE_PATH}@ @{AP_NEXTCLOUD_SERVER_LOGS_DIR}@/custom_%Y%m%d_%H%M%S.log 86400" combined

	SSLEngine on
	SSLCertificateFile @{AP_VENDORS_CERTBOT_SETUP_CONFIGS_DIR}@/letsencrypt/live/ohmmanipadmehum.ddns.info/fullchain.pem
	SSLCertificateKeyFile @{AP_VENDORS_CERTBOT_SETUP_CONFIGS_DIR}@/letsencrypt/live/ohmmanipadmehum.ddns.info/privkey.pem
	Include @{AP_VENDORS_CERTBOT_SETUP_CONFIGS_DIR}@/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
